<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Lead Task Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --navy: #1a2744;
    --navy-mid: #243354;
    --accent: #4f7ef8;
    --accent-light: #dce7ff;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --surface: #f8fafc;
    --surface-card: #ffffff;
    --border: #e2e8f0;
    --text: #0f172a;
    --text-muted: #64748b;
    --text-light: #94a3b8;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
    --shadow-lg: 0 8px 32px rgba(26,39,68,.14);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--surface);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── TOP BAR ── */
  .topbar {
    background: var(--navy);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.18);
  }
  .topbar-brand {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 1.15rem;
    color: #fff;
    letter-spacing: -.02em;
    display: flex; align-items: center; gap: 10px;
  }
  .topbar-brand svg { opacity: .85; }
  .topbar-nav { display: flex; gap: 8px; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'Inter', sans-serif;
    font-size: .875rem; font-weight: 500;
    padding: 8px 16px; border-radius: 8px;
    border: none; cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3d6ef5; transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: rgba(255,255,255,.8); border: 1px solid rgba(255,255,255,.2); }
  .btn-ghost:hover { background: rgba(255,255,255,.1); color: #fff; }
  .btn-outline { background: #fff; color: var(--navy); border: 1.5px solid var(--border); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: .8rem; border-radius: 6px; }
  .btn-icon { padding: 6px; border-radius: 6px; background: transparent; border: none; cursor: pointer; color: var(--text-muted); transition: all .15s; }
  .btn-icon:hover { background: var(--accent-light); color: var(--accent); }

  /* ── LAYOUT ── */
  .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── HOME / TASK LIST ── */
  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  .page-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.6rem; font-weight: 700;
    color: var(--navy);
  }
  .page-subtitle { font-size: .9rem; color: var(--text-muted); margin-top: 2px; }

  .tasks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 18px;
  }
  .task-card {
    background: var(--surface-card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: all .18s;
    box-shadow: var(--shadow);
  }
  .task-card:hover { border-color: var(--accent); box-shadow: var(--shadow-lg); transform: translateY(-2px); }
  .task-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
  .task-card-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600; font-size: 1rem; color: var(--navy);
    line-height: 1.35;
  }
  .task-card-meta { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }
  .meta-item { display: flex; align-items: center; gap: 7px; font-size: .8rem; color: var(--text-muted); }
  .meta-item svg { flex-shrink: 0; }
  .badge {
    display: inline-flex; align-items: center;
    padding: 3px 9px; border-radius: 20px;
    font-size: .75rem; font-weight: 600;
  }
  .badge-blue { background: var(--accent-light); color: var(--accent); }
  .badge-green { background: #dcfce7; color: #16a34a; }

  .empty-state {
    text-align: center; padding: 80px 24px;
    color: var(--text-muted);
  }
  .empty-state svg { margin: 0 auto 16px; opacity: .35; display: block; }
  .empty-state h3 { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .empty-state p { font-size: .9rem; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(15,23,42,.5);
    backdrop-filter: blur(3px);
    z-index: 200;
    display: none; align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 14px;
    padding: 28px;
    width: 100%; max-width: 520px;
    box-shadow: var(--shadow-lg);
    animation: modalIn .18s ease;
  }
  @keyframes modalIn { from { opacity: 0; transform: scale(.96) translateY(10px); } to { opacity: 1; transform: none; } }
  .modal-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.2rem; font-weight: 700; color: var(--navy);
    margin-bottom: 20px;
  }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  /* ── FORM ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: .8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
  input, select {
    height: 40px; padding: 0 12px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-family: 'Inter', sans-serif; font-size: .9rem; color: var(--text);
    background: var(--surface);
    transition: border-color .15s;
    outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); background: #fff; }

  /* ── TASK DETAIL ── */
  .detail-header {
    background: var(--navy);
    border-radius: 14px;
    padding: 28px 32px;
    margin-bottom: 24px;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  .detail-header::before {
    content: '';
    position: absolute; top: -40px; right: -40px;
    width: 200px; height: 200px;
    background: rgba(79,126,248,.15);
    border-radius: 50%;
    z-index: 0;
    pointer-events: none;
  }
  .detail-event-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.5rem; font-weight: 700;
    margin-bottom: 6px; position: relative;
  }
  .detail-meta-row { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 14px; position: relative; }
  .detail-meta-item { display: flex; flex-direction: column; gap: 2px; }
  .detail-meta-label { font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; opacity: .6; }
  .detail-meta-value { font-size: .95rem; font-weight: 500; }

  /* ── TABLE ── */
  .table-section {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .table-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .table-toolbar-title { font-weight: 600; font-size: .95rem; color: var(--navy); }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  thead th {
    background: var(--navy);
    color: rgba(255,255,255,.85);
    font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em;
    padding: 10px 14px;
    text-align: left;
    white-space: nowrap;
  }
  thead th:first-child { width: 44px; text-align: center; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8fafc; }
  td { padding: 9px 14px; vertical-align: top; }
  td:first-child { text-align: center; color: var(--text-muted); font-weight: 500; font-size: .8rem; }

  /* ── TIME SLOTS ── */
  .time-slots-cell { display: flex; flex-direction: column; gap: 4px; }
  .time-slot-row { display: flex; align-items: center; gap: 6px; }
  .time-input-sm {
    height: 30px; width: 90px; padding: 0 8px;
    border: 1.5px solid var(--border); border-radius: 6px;
    font-size: .8rem; font-family: 'Inter', sans-serif;
    background: var(--surface);
    outline: none; transition: border-color .15s;
  }
  .time-input-sm:focus { border-color: var(--accent); background: #fff; }
  .time-sep { font-size: .75rem; color: var(--text-muted); font-weight: 500; }
  .add-slot-btn {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px dashed var(--accent);
    background: transparent; cursor: pointer;
    color: var(--accent); font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; padding: 0; line-height: 1;
  }
  .add-slot-btn:hover { background: var(--accent); color: #fff; border-style: solid; }
  .remove-slot-btn {
    width: 18px; height: 18px; border-radius: 50%;
    border: none; background: #fef2f2; cursor: pointer;
    color: var(--danger); font-size: .85rem;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; padding: 0;
  }
  .remove-slot-btn:hover { background: var(--danger); color: #fff; }

  .calc-cell { font-weight: 600; color: var(--navy); }
  .calc-cell .mins { font-size: .85rem; }
  .calc-cell .hrs { font-size: .75rem; color: var(--text-muted); font-weight: 400; margin-top: 1px; }

  .name-input {
    width: 100%; min-width: 160px;
    height: 30px; padding: 0 8px;
    border: 1.5px solid transparent; border-radius: 6px;
    font-size: .85rem; font-family: 'Inter', sans-serif; color: var(--text);
    background: transparent;
    outline: none; transition: border-color .15s, background .15s;
  }
  .name-input:hover { background: var(--surface); border-color: var(--border); }
  .name-input:focus { border-color: var(--accent); background: #fff; }

  /* ── TOTALS ROW ── */
  .totals-row { background: var(--accent-light) !important; }
  .totals-row td { font-weight: 700; color: var(--navy); font-size: .85rem; }

  /* ── ACTION BAR ── */
  .action-bar {
    display: flex; gap: 10px; flex-wrap: wrap;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    border-radius: 0 0 var(--radius) var(--radius);
  }

  /* ── DOWNLOAD BUTTONS ── */
  .btn-word { background: #2b579a; color: #fff; }
  .btn-word:hover { background: #1e3f78; }
  .btn-pdf { background: #c0392b; color: #fff; }
  .btn-pdf:hover { background: #96281b; }

  /* ── BACK BUTTON AREA ── */
  .breadcrumb {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 20px;
    font-size: .88rem; color: var(--text-muted);
  }
  .breadcrumb a { color: var(--accent); cursor: pointer; font-weight: 500; text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--navy); color: #fff;
    padding: 12px 18px; border-radius: 8px;
    font-size: .875rem; font-weight: 500;
    box-shadow: var(--shadow-lg);
    z-index: 999;
    display: flex; align-items: center; gap: 8px;
    transform: translateY(80px); opacity: 0;
    transition: all .25s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: #166534; }
  .toast.error { background: #991b1b; }

  /* ── DELETE CONFIRM ── */
  .delete-row-btn {
    opacity: 0; transition: opacity .15s;
    width: 22px; height: 22px; border-radius: 50%;
    border: none; background: #fef2f2; cursor: pointer;
    color: var(--danger); font-size: .9rem;
    display: inline-flex; align-items: center; justify-content: center;
  }
  tr:hover .delete-row-btn { opacity: 1; }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .container { padding: 16px 12px; }
    .form-grid { grid-template-columns: 1fr; }
    .detail-header { padding: 18px 16px; }
    .topbar { padding: 0 12px; }
    .topbar-brand { font-size: 1rem; }
    .detail-event-name { font-size: 1.1rem; }
    .time-input-sm { width: 72px; font-size: .75rem; }
    .detail-meta-row { gap: 10px; }
    .tasks-grid { grid-template-columns: 1fr; }
    .modal { padding: 20px 16px; }
    .action-bar { flex-direction: column; }
    .action-bar .btn { width: 100%; justify-content: center; }
    .btn-danger { margin-left: 0 !important; }
    table { font-size: .78rem; }
    thead th { padding: 8px 8px; font-size: .7rem; }
    td { padding: 7px 8px; }
    .name-input { min-width: 110px; }
    .table-wrap { -webkit-overflow-scrolling: touch; }
    .topbar-nav .btn-ghost { display: none; }
  }
  @media (max-width: 400px) {
    .time-input-sm { width: 64px; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<nav class="topbar">
  <div class="topbar-brand">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 7h8M8 12h8M8 17h5"/>
    </svg>
    Group Lead Tracker
  </div>
  <div class="topbar-nav">
    <button class="btn btn-ghost btn-sm" onclick="showView('home')">All Tasks</button>
    <button class="btn btn-primary btn-sm" onclick="openNewTaskModal()">+ New Task</button>
  </div>
</nav>

<!-- HOME VIEW -->
<div id="view-home" class="view active">
  <div class="container">
    <div class="page-header">
      <div>
        <h1 class="page-title">Task Overview</h1>
        <p class="page-subtitle" id="task-count-label">Loading…</p>
      </div>
      <button class="btn btn-primary" onclick="openNewTaskModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        New Task
      </button>
    </div>
    <div id="tasks-grid" class="tasks-grid"></div>
  </div>
</div>

<!-- TASK DETAIL VIEW -->
<div id="view-detail" class="view">
  <div class="container">
    <div class="breadcrumb">
      <a onclick="showView('home')">← All Tasks</a>
      <span>/</span>
      <span id="breadcrumb-name">Task</span>
    </div>

    <div class="detail-header">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:relative;z-index:2;">
        <div class="detail-event-name" id="detail-event-name">—</div>
        <button class="btn btn-outline btn-sm" style="flex-shrink:0;margin-top:2px;position:relative;z-index:3;" onclick="openEditTaskModal()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit
        </button>
      </div>
      <div class="detail-meta-row">
        <div class="detail-meta-item">
          <span class="detail-meta-label">Date</span>
          <span class="detail-meta-value" id="detail-date">—</span>
        </div>
        <div class="detail-meta-item">
          <span class="detail-meta-label">Event Start Time</span>
          <span class="detail-meta-value" id="detail-start-time">—</span>
        </div>
        <div class="detail-meta-item">
          <span class="detail-meta-label">Team Lead</span>
          <span class="detail-meta-value" id="detail-lead">—</span>
        </div>
        <div class="detail-meta-item">
          <span class="detail-meta-label">Activity</span>
          <span class="detail-meta-value" id="detail-activity">—</span>
        </div>
      </div>
    </div>

    <div class="table-section">
      <div class="table-toolbar">
        <span class="table-toolbar-title">Group Members</span>
        <button class="btn btn-outline btn-sm" onclick="addMemberRow()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          Add Member
        </button>
      </div>
      <div class="table-wrap">
        <table id="members-table">
          <thead>
            <tr>
              <th>No.</th>
              <th>Group Member Name</th>
              <th>Reporting Time</th>
              <th>Activity Start / End Time(s)</th>
              <th>Total Minutes</th>
              <th>Total Hours</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="members-tbody"></tbody>
        </table>
      </div>
      <div class="action-bar">
        <button class="btn btn-pdf" onclick="downloadPDF()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
          Download as PDF
        </button>
        <button class="btn btn-danger btn-sm" style="margin-left:auto;" onclick="deleteCurrentTask()">Delete Task</button>
      </div>
    </div>
  </div>
</div>

<!-- NEW TASK MODAL -->
<div class="modal-overlay" id="modal-new-task">
  <div class="modal">
    <div class="modal-title">Create New Task</div>
    <div class="form-grid">
      <div class="form-group full">
        <label>Name of Event / Task</label>
        <input type="text" id="nt-name" placeholder="e.g. The Image as a Citizen">
      </div>
      <div class="form-group full">
        <label>Name of Team Activity</label>
        <select id="nt-activity" onchange="toggleOtherActivity()">
          <option value="">— Select activity —</option>
          <option value="Check-in managers">Check-in managers</option>
          <option value="Ushers">Ushers</option>
          <option value="Food distribution">Food distribution</option>
          <option value="Accessibility Support">Accessibility Support</option>
          <option value="DJ and projection">DJ and projection</option>
          <option value="Guest ushering/protocol">Guest ushering/protocol</option>
          <option value="Bouncers">Bouncers</option>
          <option value="Photographer">Photographer</option>
          <option value="Videographer">Videographer</option>
          <option value="Clear up">Clear up</option>
          <option value="Other">Other</option>
        </select>
        <input type="text" id="nt-activity-other" placeholder="Describe the activity…" style="display:none; margin-top:8px;">
      </div>
      <div class="form-group full">
        <label>Task Lead Name(s)</label>
        <input type="text" id="nt-lead" placeholder="e.g. Joe Doe">
      </div>
      <div class="form-group">
        <label>Event Date</label>
        <input type="date" id="nt-date">
      </div>
      <div class="form-group">
        <label>Event Start Time</label>
        <input type="time" id="nt-start">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-new-task')">Cancel</button>
      <button class="btn btn-primary" onclick="createTask()">Create Task</button>
    </div>
  </div>
</div>

<!-- EDIT TASK MODAL -->
<div class="modal-overlay" id="modal-edit-task">
  <div class="modal">
    <div class="modal-title">Edit Task</div>
    <div class="form-grid">
      <div class="form-group full">
        <label>Name of Event / Task</label>
        <input type="text" id="et-name" placeholder="e.g. The Image as a Citizen">
      </div>
      <div class="form-group full">
        <label>Name of Team Activity</label>
        <select id="et-activity" onchange="toggleOtherActivityEdit()">
          <option value="">— Select activity —</option>
          <option value="Check-in managers">Check-in managers</option>
          <option value="Ushers">Ushers</option>
          <option value="Food distribution">Food distribution</option>
          <option value="Accessibility Support">Accessibility Support</option>
          <option value="DJ and projection">DJ and projection</option>
          <option value="Guest ushering/protocol">Guest ushering/protocol</option>
          <option value="Bouncers">Bouncers</option>
          <option value="Photographer">Photographer</option>
          <option value="Videographer">Videographer</option>
          <option value="Clear up">Clear up</option>
          <option value="Other">Other</option>
        </select>
        <input type="text" id="et-activity-other" placeholder="Describe the activity…" style="display:none; margin-top:8px;">
      </div>
      <div class="form-group full">
        <label>Task Lead Name(s)</label>
        <input type="text" id="et-lead" placeholder="e.g. Joe Doe">
      </div>
      <div class="form-group">
        <label>Event Date</label>
        <input type="date" id="et-date">
      </div>
      <div class="form-group">
        <label>Event Start Time</label>
        <input type="time" id="et-start">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-edit-task')">Cancel</button>
      <button class="btn btn-primary" onclick="saveEditTask()">Save Changes</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- docx / pdf libraries -->
<script>
// Load docx library dynamically with multiple fallbacks
(function() {
  const urls = [
    'https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js',
    'https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js'
  ];
  let idx = 0;
  function tryLoad() {
    if (idx >= urls.length) return;
    const s = document.createElement('script');
    s.src = urls[idx++];
    s.onerror = tryLoad;
    document.head.appendChild(s);
  }
  tryLoad();
})();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<script>
// ─────────────── STATE ───────────────
let tasks = [];
let currentTaskId = null;

const STORAGE_KEY = 'gltracker_tasks_v1';

function saveTasks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

function loadTasks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    tasks = raw ? JSON.parse(raw) : [];
  } catch(e) { tasks = []; }
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function formatDate(d) {
  if (!d) return '—';
  const parts = d.split('-');
  if (parts.length !== 3) return d;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${parseInt(parts[2])} ${months[parseInt(parts[1])-1]} ${parts[0]}`;
}

// ─────────────── VIEWS ───────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  if (name === 'home') renderHome();
}

// ─────────────── HOME ───────────────
function renderHome() {
  const grid = document.getElementById('tasks-grid');
  const label = document.getElementById('task-count-label');
  grid.innerHTML = '';
  label.textContent = tasks.length === 0 ? 'No tasks yet' : `${tasks.length} task${tasks.length > 1 ? 's' : ''}`;

  if (tasks.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 7h8M8 12h8M8 17h5"/>
        </svg>
        <h3>No tasks yet</h3>
        <p>Create your first task to start tracking group members.</p>
      </div>`;
    return;
  }

  tasks.slice().reverse().forEach(task => {
    const totalMins = computeTaskTotal(task);
    const card = document.createElement('div');
    card.className = 'task-card';
    card.onclick = () => openTask(task.id);
    card.innerHTML = `
      <div class="task-card-header">
        <div class="task-card-title">${esc(task.name)}</div>
        <span class="badge badge-blue">${task.members.length} member${task.members.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="task-card-meta">
        ${task.activity ? `<div class="meta-item">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          ${esc(task.activity)}</div>` : ''}
        ${task.date ? `<div class="meta-item">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${formatDate(task.date)}</div>` : ''}
        ${task.lead ? `<div class="meta-item">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          ${esc(task.lead)}</div>` : ''}
        ${totalMins > 0 ? `<div class="meta-item">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Total: <strong style="color:var(--navy)">${totalMins} min</strong></div>` : ''}
      </div>
    `;
    grid.appendChild(card);
  });
}

function computeTaskTotal(task) {
  return task.members.reduce((sum, m) => sum + calcMemberMins(m.slots), 0);
}

// ─────────────── MODAL ───────────────
function openNewTaskModal() {
  document.getElementById('nt-name').value = '';
  document.getElementById('nt-activity').value = '';
  document.getElementById('nt-activity-other').value = '';
  document.getElementById('nt-activity-other').style.display = 'none';
  document.getElementById('nt-lead').value = '';
  document.getElementById('nt-date').value = '';
  document.getElementById('nt-start').value = '';
  openModal('modal-new-task');
  setTimeout(() => document.getElementById('nt-name').focus(), 50);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function toggleOtherActivity() {
  const sel = document.getElementById('nt-activity');
  const other = document.getElementById('nt-activity-other');
  other.style.display = sel.value === 'Other' ? 'block' : 'none';
  if (sel.value !== 'Other') other.value = '';
}

function toggleOtherActivityEdit() {
  const sel = document.getElementById('et-activity');
  const other = document.getElementById('et-activity-other');
  other.style.display = sel.value === 'Other' ? 'block' : 'none';
  if (sel.value !== 'Other') other.value = '';
}

function openEditTaskModal() {
  const task = tasks.find(t => t.id === currentTaskId);
  if (!task) return;

  document.getElementById('et-name').value = task.name || '';
  document.getElementById('et-lead').value = task.lead || '';
  document.getElementById('et-date').value = task.date || '';
  document.getElementById('et-start').value = task.startTime || '';

  // Handle activity dropdown
  const actSel = document.getElementById('et-activity');
  const actOther = document.getElementById('et-activity-other');
  const knownOptions = Array.from(actSel.options).map(o => o.value);
  if (knownOptions.includes(task.activity)) {
    actSel.value = task.activity;
    actOther.style.display = 'none';
    actOther.value = '';
  } else if (task.activity) {
    actSel.value = 'Other';
    actOther.style.display = 'block';
    actOther.value = task.activity;
  } else {
    actSel.value = '';
    actOther.style.display = 'none';
    actOther.value = '';
  }

  openModal('modal-edit-task');
  setTimeout(() => document.getElementById('et-name').focus(), 50);
}

function saveEditTask() {
  const task = tasks.find(t => t.id === currentTaskId);
  if (!task) return;

  const name = document.getElementById('et-name').value.trim();
  if (!name) { showToast('Please enter a task name.', 'error'); return; }

  const actSel = document.getElementById('et-activity').value;
  const actOther = document.getElementById('et-activity-other').value.trim();
  const activity = actSel === 'Other' ? (actOther || 'Other') : actSel;

  task.name = name;
  task.activity = activity;
  task.lead = document.getElementById('et-lead').value.trim();
  task.date = document.getElementById('et-date').value;
  task.startTime = document.getElementById('et-start').value;

  saveTasks();
  closeModal('modal-edit-task');
  openTask(task.id);
  renderHome();
  showToast('Task updated!', 'success');
}

function createTask() {
  const name = document.getElementById('nt-name').value.trim();
  if (!name) { showToast('Please enter a task name.', 'error'); return; }
  const actSel = document.getElementById('nt-activity').value;
  const actOther = document.getElementById('nt-activity-other').value.trim();
  const activity = actSel === 'Other' ? (actOther || 'Other') : actSel;
  const task = {
    id: genId(),
    name,
    activity,
    lead: document.getElementById('nt-lead').value.trim(),
    date: document.getElementById('nt-date').value,
    startTime: document.getElementById('nt-start').value,
    members: []
  };
  tasks.push(task);
  saveTasks();
  closeModal('modal-new-task');
  openTask(task.id);
  showToast('Task created!', 'success');
}

// ─────────────── TASK DETAIL ───────────────
function openTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  currentTaskId = id;

  document.getElementById('breadcrumb-name').textContent = task.name;
  document.getElementById('detail-event-name').textContent = task.name;
  document.getElementById('detail-date').textContent = formatDate(task.date);
  document.getElementById('detail-start-time').textContent = task.startTime || '—';
  document.getElementById('detail-lead').textContent = task.lead || '—';
  document.getElementById('detail-activity').textContent = task.activity || '—';

  renderMembersTable(task);
  showView('detail');
}

function renderMembersTable(task) {
  const tbody = document.getElementById('members-tbody');
  tbody.innerHTML = '';
  task.members.forEach((m, idx) => {
    tbody.appendChild(buildMemberRow(task, m, idx));
  });
  updateTotals(task);
}

function buildMemberRow(task, member, idx) {
  const tr = document.createElement('tr');
  tr.dataset.memberId = member.id;

  // No.
  const tdNo = document.createElement('td');
  tdNo.textContent = idx + 1;
  tr.appendChild(tdNo);

  // Name
  const tdName = document.createElement('td');
  const nameInput = document.createElement('input');
  nameInput.className = 'name-input';
  nameInput.type = 'text';
  nameInput.value = member.name;
  nameInput.placeholder = 'Member name';
  nameInput.oninput = () => { member.name = nameInput.value; saveTasks(); };
  tdName.appendChild(nameInput);
  tr.appendChild(tdName);

  // Reporting time
  const tdReport = document.createElement('td');
  const reportInput = document.createElement('input');
  reportInput.className = 'time-input-sm';
  reportInput.type = 'time';
  reportInput.value = member.reportingTime || '';
  reportInput.oninput = () => { member.reportingTime = reportInput.value; saveTasks(); };
  tdReport.appendChild(reportInput);
  tr.appendChild(tdReport);

  // Time slots
  const tdSlots = document.createElement('td');
  tdSlots.appendChild(buildSlotsCell(task, member, tr));
  tr.appendChild(tdSlots);

  // Total minutes
  const tdMins = document.createElement('td');
  tdMins.className = 'calc-cell';
  tdMins.id = `mins-${member.id}`;
  const mins = calcMemberMins(member.slots);
  tdMins.innerHTML = `<div class="mins">${mins}</div>`;
  tr.appendChild(tdMins);

  // Total hours
  const tdHrs = document.createElement('td');
  tdHrs.className = 'calc-cell';
  tdHrs.id = `hrs-${member.id}`;
  tdHrs.innerHTML = `<div class="hrs">${(mins / 60).toFixed(5)}</div>`;
  tr.appendChild(tdHrs);

  // Delete row
  const tdDel = document.createElement('td');
  const delBtn = document.createElement('button');
  delBtn.className = 'delete-row-btn';
  delBtn.title = 'Remove member';
  delBtn.innerHTML = '×';
  delBtn.onclick = () => {
    task.members = task.members.filter(m => m.id !== member.id);
    saveTasks();
    renderMembersTable(task);
  };
  tdDel.appendChild(delBtn);
  tr.appendChild(tdDel);

  return tr;
}

function buildSlotsCell(task, member, tr) {
  const wrap = document.createElement('div');
  wrap.className = 'time-slots-cell';

  const refreshSlots = () => {
    wrap.innerHTML = '';
    member.slots.forEach((slot, si) => {
      const row = document.createElement('div');
      row.className = 'time-slot-row';

      const startInput = document.createElement('input');
      startInput.className = 'time-input-sm';
      startInput.type = 'time';
      startInput.value = slot.start || '';
      startInput.title = 'Start time';
      startInput.oninput = () => {
        slot.start = startInput.value;
        saveTasks();
        refreshCalc(task, member);
      };

      const sep = document.createElement('span');
      sep.className = 'time-sep';
      sep.textContent = '→';

      const endInput = document.createElement('input');
      endInput.className = 'time-input-sm';
      endInput.type = 'time';
      endInput.value = slot.end || '';
      endInput.title = 'End time';
      endInput.oninput = () => {
        slot.end = endInput.value;
        saveTasks();
        refreshCalc(task, member);
      };

      row.appendChild(startInput);
      row.appendChild(sep);
      row.appendChild(endInput);

      if (si > 0) {
        const rmBtn = document.createElement('button');
        rmBtn.className = 'remove-slot-btn';
        rmBtn.title = 'Remove this slot';
        rmBtn.innerHTML = '×';
        rmBtn.onclick = () => {
          member.slots.splice(si, 1);
          saveTasks();
          refreshCalc(task, member);
          refreshSlots();
        };
        row.appendChild(rmBtn);
      }
      wrap.appendChild(row);
    });

    // Add slot button
    const addBtn = document.createElement('button');
    addBtn.className = 'add-slot-btn';
    addBtn.title = 'Add another time slot';
    addBtn.innerHTML = '+';
    addBtn.onclick = () => {
      member.slots.push({ start: '', end: '' });
      saveTasks();
      refreshSlots();
    };
    wrap.appendChild(addBtn);
  };

  refreshSlots();
  return wrap;
}

function calcMemberMins(slots) {
  let total = 0;
  slots.forEach(s => {
    if (s.start && s.end) {
      const [sh, sm] = s.start.split(':').map(Number);
      const [eh, em] = s.end.split(':').map(Number);
      const diff = (eh * 60 + em) - (sh * 60 + sm);
      if (diff > 0) total += diff;
    }
  });
  return total;
}

function refreshCalc(task, member) {
  const mins = calcMemberMins(member.slots);
  const minsEl = document.getElementById(`mins-${member.id}`);
  const hrsEl = document.getElementById(`hrs-${member.id}`);
  if (minsEl) minsEl.innerHTML = `<div class="mins">${mins}</div>`;
  if (hrsEl) hrsEl.innerHTML = `<div class="hrs">${(mins / 60).toFixed(5)}</div>`;
  updateTotals(task);
}

function updateTotals(task) {
  // Grand total row removed; nothing to update here
}

function addMemberRow() {
  const task = tasks.find(t => t.id === currentTaskId);
  if (!task) return;
  task.members.push({ id: genId(), name: '', reportingTime: '', slots: [{ start: '', end: '' }] });
  saveTasks();
  renderMembersTable(task);
  // Focus new name input
  const rows = document.querySelectorAll('#members-tbody tr');
  const lastRow = rows[rows.length - 1];
  if (lastRow) {
    const input = lastRow.querySelector('.name-input');
    if (input) input.focus();
  }
}

function deleteCurrentTask() {
  if (!confirm('Delete this task? This cannot be undone.')) return;
  tasks = tasks.filter(t => t.id !== currentTaskId);
  saveTasks();
  currentTaskId = null;
  showView('home');
  showToast('Task deleted.', '');
}

// ─────────────── TOAST ───────────────
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.className = 'toast'; }, 3000);
}

// ─────────────── DOWNLOAD WORD ───────────────
function downloadWord() {
  const task = tasks.find(t => t.id === currentTaskId);
  if (!task) return;

  // Try docx library first, fall back to HTML-based .doc
  if (window.docx) {
    downloadWordDocx(task);
  } else {
    downloadWordHtml(task);
  }
}

function downloadWordHtml(task) {
  // Fallback: generate a richly styled HTML file that Word opens perfectly
  const rows = task.members.map((m, i) => {
    const slots = m.slots.length > 0
      ? m.slots.map(s => `${s.start || '--:--'} &rarr; ${s.end || '--:--'}`).join('<br>')
      : '--:--  &rarr;  --:--';
    const mins = calcMemberMins(m.slots);
    const bg = i % 2 !== 0 ? '#f0f4ff' : '#ffffff';
    return `<tr style="background:${bg}">
      <td style="text-align:center;padding:7pt 6pt;font-size:11pt">${i + 1}</td>
      <td style="padding:7pt 8pt;font-size:11pt">${esc(m.name) || ''}</td>
      <td style="text-align:center;padding:7pt 6pt;font-size:11pt">${m.reportingTime || ''}</td>
      <td style="padding:7pt 8pt;font-size:11pt">${slots}</td>
      <td style="text-align:center;padding:7pt 6pt;font-size:12pt;font-weight:bold">${mins}</td>
      <td style="text-align:center;padding:7pt 6pt;font-size:11pt">${(mins/60).toFixed(5)}</td>
    </tr>`;
  }).join('');

  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="utf-8">
<style>
  body { font-family: Calibri, Arial, sans-serif; margin: 2cm; }
  h1 { font-size:16pt; color:#1a2744; text-align:center; margin-bottom:18pt; }
  .meta { margin-bottom:5pt; font-size:11pt; }
  .meta b { min-width:180pt; display:inline-block; }
  table { border-collapse:collapse; width:100%; margin-top:16pt; }
  thead tr { background:#1a2744; }
  thead th { color:#fff; font-size:10pt; font-weight:bold; padding:8pt 6pt; text-align:center; border:1pt solid #1a2744; }
  tbody td { border:1pt solid #c8d4f0; vertical-align:middle; }
  tbody tr:hover { background:#e8eeff; }
</style></head>
<body>
<h1>Group Lead's Task Monitoring Sheet</h1>
<p class="meta"><b>Name of Event:</b> ${esc(task.name)}</p>
<p class="meta"><b>Task Lead Name(s):</b> ${esc(task.lead)}</p>
<p class="meta"><b>Name of Team Activity:</b> ${esc(task.activity)}</p>
<p class="meta"><b>Event Date:</b> ${formatDate(task.date)}</p>
<p class="meta"><b>Event Start Time:</b> ${task.startTime || '—'}</p>
<table>
  <thead><tr>
    <th style="width:5%">No.</th>
    <th style="width:24%">Group Member Names</th>
    <th style="width:12%">Reporting Time</th>
    <th style="width:35%">Activity Start / End Time(s)</th>
    <th style="width:12%">Total Minutes</th>
    <th style="width:12%">Total Hours</th>
  </tr></thead>
  <tbody>${rows}</tbody>
</table>
</body></html>`;

  const blob = new Blob([html], { type: 'application/msword' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const filename = ((task.name || 'event') + '_' + (task.activity || 'task')).replace(/[^a-z0-9]/gi, '_') + '.doc';
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Word document downloaded!', 'success');
}

function downloadWordDocx(task) {
  const { Document, Packer, Paragraph, Table, TableRow, TableCell, TextRun,
          WidthType, AlignmentType, HeadingLevel, ShadingType, BorderStyle } = window.docx;

  const NAVY = '1a2744';
  const SHADE_ODD = 'f0f4ff';
  const BORDER = { style: BorderStyle.SINGLE, size: 4, color: 'c8d4f0' };
  const cellBorders = { top: BORDER, bottom: BORDER, left: BORDER, right: BORDER };

  const metaPara = (label, value) => new Paragraph({
    spacing: { after: 100 },
    children: [
      new TextRun({ text: label, bold: true, size: 24, font: 'Calibri' }),
      new TextRun({ text: value || '—', size: 24, font: 'Calibri' })
    ]
  });

  const hdrCell = (text, widthPct) => new TableCell({
    width: { size: widthPct, type: WidthType.PERCENTAGE },
    shading: { type: ShadingType.SOLID, color: NAVY },
    borders: cellBorders,
    verticalAlign: 'center',
    children: [new Paragraph({
      alignment: AlignmentType.CENTER,
      spacing: { before: 80, after: 80 },
      children: [new TextRun({ text, bold: true, color: 'FFFFFF', size: 22, font: 'Calibri' })]
    })]
  });

  const dataCell = (paragraphs, center = false, shade = null) => new TableCell({
    shading: shade ? { type: ShadingType.SOLID, color: shade } : undefined,
    borders: cellBorders,
    verticalAlign: 'center',
    children: paragraphs.map(({ text, bold }) => new Paragraph({
      alignment: center ? AlignmentType.CENTER : AlignmentType.LEFT,
      spacing: { before: 60, after: 60 },
      children: [new TextRun({ text: String(text), bold: bold || false, size: 24, font: 'Calibri' })]
    }))
  });

  const dataRows = task.members.map((m, i) => {
    const shade = i % 2 !== 0 ? SHADE_ODD : 'ffffff';
    const mins = calcMemberMins(m.slots);
    const slotParas = m.slots.length > 0
      ? m.slots.map(s => ({ text: `${s.start || '--:--'}  →  ${s.end || '--:--'}` }))
      : [{ text: '--:--  →  --:--' }];
    return new TableRow({
      cantSplit: true,
      children: [
        dataCell([{ text: String(i + 1) }], true, shade),
        dataCell([{ text: m.name || '' }], false, shade),
        dataCell([{ text: m.reportingTime || '' }], true, shade),
        dataCell(slotParas, false, shade),
        dataCell([{ text: String(mins), bold: true }], true, shade),
        dataCell([{ text: (mins / 60).toFixed(5) }], true, shade)
      ]
    });
  });

  const filename = ((task.name || 'event') + '_' + (task.activity || 'task')).replace(/[^a-z0-9]/gi, '_') + '.docx';

  const doc = new Document({
    sections: [{
      properties: { page: { margin: { top: 720, bottom: 720, left: 900, right: 900 } } },
      children: [
        new Paragraph({
          alignment: AlignmentType.CENTER,
          spacing: { after: 240 },
          children: [new TextRun({ text: "Group Lead's Task Monitoring Sheet", bold: true, size: 36, font: 'Calibri', color: NAVY })]
        }),
        metaPara('Name of Event:          ', task.name),
        metaPara('Task Lead Name(s):       ', task.lead),
        metaPara('Name of Team Activity:   ', task.activity),
        metaPara('Event Date:              ', formatDate(task.date)),
        metaPara('Event Start Time:        ', task.startTime),
        new Paragraph({ spacing: { after: 160 }, children: [] }),
        new Table({
          width: { size: 100, type: WidthType.PERCENTAGE },
          rows: [
            new TableRow({
              tableHeader: true,
              children: [
                hdrCell('No.', 5),
                hdrCell('Group Member Names', 25),
                hdrCell('Reporting Time', 13),
                hdrCell('Activity Start / End Time(s)', 32),
                hdrCell('Total Minutes', 13),
                hdrCell('Total Hours', 12)
              ]
            }),
            ...dataRows
          ]
        })
      ]
    }]
  });

  Packer.toBlob(doc).then(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Word document downloaded!', 'success');
  });
}

// ─────────────── DOWNLOAD PDF ───────────────
function downloadPDF() {
  const task = tasks.find(t => t.id === currentTaskId);
  if (!task) return;
  if (typeof jspdf === 'undefined') { showToast('PDF library not loaded. Check your connection.', 'error'); return; }

  const { jsPDF } = jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

  // Header banner
  doc.setFillColor(26, 39, 68);
  doc.rect(0, 0, 297, 26, 'F');
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(16);
  doc.setTextColor(255, 255, 255);
  doc.text("Group Lead's Task Monitoring Sheet", 148.5, 17, { align: 'center' });

  // Meta info block — two columns side by side
  doc.setTextColor(20, 20, 20);
  doc.setFontSize(11);
  const col1x = 14, col2x = 155;
  let y1 = 35, y2 = 35;
  const metaLeft = [
    ['Name of Event:', task.name],
    ['Task Lead Name(s):', task.lead],
    ['Name of Team Activity:', task.activity]
  ];
  const metaRight = [
    ['Event Date:', formatDate(task.date)],
    ['Event Start Time:', task.startTime]
  ];
  metaLeft.forEach(([label, val]) => {
    doc.setFont('helvetica', 'bold'); doc.text(label, col1x, y1);
    doc.setFont('helvetica', 'normal'); doc.text(val || '—', col1x + 62, y1);
    y1 += 7.5;
  });
  metaRight.forEach(([label, val]) => {
    doc.setFont('helvetica', 'bold'); doc.text(label, col2x, y2);
    doc.setFont('helvetica', 'normal'); doc.text(val || '—', col2x + 42, y2);
    y2 += 7.5;
  });

  const tableStartY = Math.max(y1, y2) + 5;

  // Build table body — each slot on its own line via \n in the cell
  const tableData = task.members.map((m, i) => {
    const slots = m.slots.length > 0
      ? m.slots.map(s => `${s.start || '--:--'}  to  ${s.end || '--:--'}`).join('\n')
      : '--:--  to  --:--';
    const mins = calcMemberMins(m.slots);
    return [i + 1, m.name || '', m.reportingTime || '', slots, String(mins), (mins / 60).toFixed(5)];
  });

  doc.autoTable({
    startY: tableStartY,
    head: [['No.', 'Group Member Names', 'Reporting Time', 'Activity Start / End Time(s)', 'Total\nMinutes', 'Total\nHours']],
    body: tableData,
    theme: 'grid',
    tableWidth: 'auto',
    headStyles: {
      fillColor: [26, 39, 68],
      textColor: 255,
      fontStyle: 'bold',
      fontSize: 10,
      halign: 'center',
      valign: 'middle',
      cellPadding: { top: 5, bottom: 5, left: 2, right: 2 }
    },
    bodyStyles: {
      fontSize: 10,
      valign: 'middle',
      cellPadding: { top: 5, bottom: 5, left: 3, right: 3 },
      lineColor: [208, 218, 240],
      lineWidth: 0.2
    },
    alternateRowStyles: { fillColor: [245, 248, 255] },
    columnStyles: {
      0: { cellWidth: 12, halign: 'center' },
      1: { cellWidth: 60 },
      2: { cellWidth: 30, halign: 'center' },
      3: { cellWidth: 95, overflow: 'linebreak' },
      4: { cellWidth: 30, halign: 'center', fontStyle: 'bold' },
      5: { cellWidth: 42, halign: 'center' }
    },
    margin: { left: 14, right: 14 },
    tableLineColor: [26, 39, 68],
    tableLineWidth: 0.35,
    didParseCell: (data) => {
      if (data.section === 'body' && data.column.index === 4) {
        data.cell.styles.fontStyle = 'bold';
        data.cell.styles.fontSize = 11;
      }
    }
  });

  const filename = ((task.name || 'event') + '_' + (task.activity || 'task')).replace(/[^a-z0-9]/gi, '_') + '.pdf';
  doc.save(filename);
  showToast('PDF downloaded!', 'success');
}

// ─────────────── HELPERS ───────────────
function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

// ─────────────── INIT ───────────────
loadTasks();
renderHome();
</script>
</body>
</html>
